{% extends "base_layout.html" %}
{% load static %}

{% block page_title %}
  {{post.title}}
{% endblock %}

{% block css_files%}
  <link rel="stylesheet" href="{% static "blog/post-detail.css" %}" >
{% endblock %}

{% block page_body %}
 <section id="summary">
    <h2>{{post.title}}</h2>
    <article>
        <img src ="{% static "blog/images/"|add:post.image_name %}" alt = "{{post.title}}"/>
        <address>By <a href="mailto:test@test.com">{{post.author}}</a></address>
        <div>Last updated on <time>{{post.date|date:"D d F Y"}}</time></div>
    </article>
 </section>
 <main>
  
  {{post.content|linebreaks}}
 </main>
{% endblock %}
