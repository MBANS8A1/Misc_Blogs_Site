{% extends "base_layout.html" %}

{% block page_title %}
 My Stored (Bookmarked) Posts
{% endblock %}

{% block page_body %}
  <section>
    <ul>
      {% for stored_post in posts %}
        <li><a href="{% url "post-details-page" stored_post.slug %}">{{ stored_post.title }}</a></li>
      {% endfor %}
    </ul>
  </section>
{% endblock %}
